  }

  .crest {

  .crest-inner {

  .stats-bar {

  .stats-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 12px 32px;

    flex-wrap: wrap;
  }

  .stat {

    align-items: center;
    gap: 7px;

    letter-spacing: 0.09em;
    text-transform: uppercase;
  }

  .stat strong {
    color: var(--gold);
    font-size: 0.98rem;
    font-weight: 600;
    letter-spacing: 0;
    text-transform: none;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 32px 60px;
  }

  .filters-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 26px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .filters-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .filters-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .filters-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .filter-group label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    color: var(--text-light);
  }

  .filter-group input,
  .filter-group select {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.875rem;
    padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--cream);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }

  .filter-group select {

    background-repeat: no-repeat;
    background-position: right 11px center;
    padding-right: 30px;
    cursor: pointer;
  }

  .filter-group input:focus,
  .filter-group select:focus {
    border-color: var(--navy-light);
    box-shadow: 0 0 0 3px rgba(37,72,128,0.09);
    background: var(--white);
  }

  .btn-reset {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--navy);
    color: var(--navy);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    height: fit-content;

  .btn-reset:hover { background: var(--navy); color: var(--white); }

  .results-meta {

    align-items: center;
    margin-bottom: 10px;

  .results-count {

  .table-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: var(--shadow);

    cursor: pointer;

  tbody tr {

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h.trim().toLowerCase().replace(' ','_')] = (vals[i]||'').trim());
    return obj;
  });
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dt = new Date(+y, +m-1, +day);
  return `${days[dt.getDay()]} ${months[+m-1]} ${+day}`;
}

function leagueBadge(l) {
  const map = {
    'ISL': 'badge-isl',
    'NESLL': 'badge-nesll',
    'Tournament': 'badge-tournament',
    'Non-League': 'badge-nonleague'
  };
  return `<span class="badge ${map[l]||'badge-nonleague'}">${l}</span>`;
}

let data = parseCSV(CSV);
let sortCol = 'date';
let sortDir = 1;

// Populate school dropdown
const schools = [...new Set(data.map(r => r.school))].sort();
const sel = document.getElementById('filter-school');
schools.forEach(s => {
  const o = document.createElement('option');
  o.value = s; o.textContent = s;
  sel.appendChild(o);
});

document.getElementById('stat-schools').textContent = schools.length;
document.getElementById('stat-games').textContent = data.length;

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    th.querySelector('.sort-arrow').textContent = '↕';
  });
  const th = document.getElementById('th-' + col);
  if (th) {
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir === 1 ? '↑' : '↓';
  }
  render();
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const school = document.getElementById('filter-school').value;
  const league = document.getElementById('filter-league').value;
  const ha = document.getElementById('filter-ha').value;

  return data.filter(r => {
    if (school && r.school !== school) return false;
    if (league && r.league !== league) return false;
    if (ha && r.home_away !== ha) return false;
    if (search && ![r.school, r.opponent, r.location, r.league].join(' ').toLowerCase().includes(search)) return false;
    return true;
  }).sort((a, b) => {
    let av = a[sortCol] || '', bv = b[sortCol] || '';
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

function render() {
  const rows = getFiltered();
  const tbody = document.getElementById('table-body');
  document.getElementById('count').textContent = rows.length;

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="no-results">
      <div class="no-results-title">No games found</div>
      <div>Try adjusting your filters</div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="school-name">${r.school}</td>
      <td class="opponent-name">${r.opponent}</td>
      <td class="date-cell">${formatDate(r.date)}</td>
      <td class="time-cell">${r.time}</td>
      <td class="location-cell">${r.location}</td>
      <td><span class="ha-${r.home_away.toLowerCase()}">${r.home_away}</span></td>
      <td>${leagueBadge(r.league)}</td>
    </tr>
  `).join('');
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-school').value = '';
  document.getElementById('filter-league').value = '';
  document.getElementById('filter-ha').value = '';
  render();
}

['search','filter-school','filter-league','filter-ha'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

render();
